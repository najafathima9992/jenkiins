<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CI/CD Deployment</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
        }

        .status {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #27ae60;
            display: inline-block;
            border-radius: 5px;
            font-weight: bold;
        }

        footer {
            margin-top: 100px;
            font-size: 14px;
            color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 CI/CD Pipeline Working</h1>
        <p>Your application has been successfully deployed using Jenkins.</p>

        <div class="status">
            Status: SUCCESS ✅
        </div>
    </div>

    <footer>
        <p>Deployed via Jenkins | Automated Deployment</p>
    </footer>

</body>
</html>
